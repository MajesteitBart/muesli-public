<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <title>Muesli - Meeting Notes</title>
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <aside class="workspace-sidebar" id="drag-region">
        <div class="sb-header">
          <div class="logo-mark">MN</div>
          <div class="sb-title">Meeting Notes</div>
        </div>

        <button class="new-meeting" id="newMeetingBtn" type="button">
          <span class="icon-plus" aria-hidden="true"></span>
          <span>New meeting</span>
          <span class="kbd">⌘N</span>
        </button>

        <nav class="sb-section" aria-label="Primary">
          <button class="sb-item active" type="button" data-nav="home">
            <span class="nav-icon home" aria-hidden="true"></span>
            Home
          </button>
          <button class="sb-item" type="button" data-nav="search">
            <span class="nav-icon search" aria-hidden="true"></span>
            Search
            <span class="meta kbd">⌘K</span>
          </button>
          <button class="sb-item" type="button" data-nav="inbox">
            <span class="nav-icon inbox" aria-hidden="true"></span>
            Inbox
            <span class="meta badge">3</span>
          </button>
        </nav>

        <div class="sb-group-label">Meetings</div>
        <div class="sb-meetings" id="meetingHistory"></div>

        <div class="sb-footer">
          <button class="sb-item" type="button">
            <span class="nav-icon templates" aria-hidden="true"></span>
            Templates
          </button>
          <button class="sb-item" type="button">
            <span class="nav-icon settings" aria-hidden="true"></span>
            Settings
          </button>
          <button class="sb-profile" type="button">
            <div class="avatar lg sp-1">BM</div>
            <div class="profile-info">
              <div class="profile-name">Bart</div>
              <div class="profile-email">bart@muesli.local</div>
            </div>
            <span class="chev" aria-hidden="true"></span>
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="main-header">
          <button class="meeting-title-btn" id="meetingTitleButton" type="button">
            <span id="noteTitle" contenteditable="true" spellcheck="false">New meeting</span>
            <span class="chev" aria-hidden="true"></span>
          </button>
          <div class="header-actions">
            <button class="btn-ghost" id="shareButton" type="button">
              <span class="nav-icon share" aria-hidden="true"></span>
              Share
            </button>
            <div class="avatar-stack" id="participantAvatars"></div>
            <button class="btn-icon" id="moreButton" type="button" aria-label="More meeting actions">
              <span class="more-dots" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <div class="tabs" role="tablist" aria-label="Meeting views">
          <button class="tab" type="button" data-tab="summary">Summary</button>
          <button class="tab active" type="button" data-tab="transcript">Transcript <span class="tab-count" id="transcriptCount">0</span></button>
          <button class="tab" type="button" data-tab="notes">Notes</button>
          <button class="tab" type="button" data-tab="tasks">Tasks <span class="tab-count" id="taskCount">0</span></button>
        </div>

        <section class="main-body">
          <div class="recording-card" id="recordingCard">
            <div class="rec-status idle" id="recordingStatus">
              <span class="rec-dot" aria-hidden="true"></span>
              <span id="recordingStatusText">Idle</span>
            </div>
            <div class="waveform idle" id="waveform" aria-hidden="true">
              <span style="height: 8px"></span><span style="height: 16px"></span><span style="height: 10px"></span><span style="height: 20px"></span><span style="height: 12px"></span><span style="height: 18px"></span><span style="height: 9px"></span><span style="height: 15px"></span>
            </div>
            <div class="rec-time" id="elapsedTimer">00:00:00</div>
            <div class="rec-controls">
              <button class="rec-btn start-idle" id="recordButton" type="button">
                <span class="start-dot" aria-hidden="true"></span>
                <span class="record-label">Start recording</span>
              </button>
              <button class="rec-btn pause" id="pauseButton" type="button" disabled aria-label="Pause recording">
                <span class="pause-icon" aria-hidden="true"></span>
              </button>
              <button class="rec-btn stop" id="stopButton" type="button" disabled aria-label="Stop recording">
                <span class="stop-icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>

          <div class="tab-panel active" id="transcriptPanel">
            <div class="transcript" id="meetingTranscriptContent"></div>
            <form class="composer" id="privateNoteForm">
              <span class="pin" aria-hidden="true"></span>
              <input id="privateNoteInput" type="text" placeholder="Add a private meeting note..." />
              <span class="ts" id="privateNoteTime">--:--</span>
              <button class="send" id="sendPrivateNote" type="submit" aria-label="Add private meeting note" disabled>
                <span class="send-icon" aria-hidden="true"></span>
              </button>
            </form>
          </div>

          <div class="tab-panel" id="summaryPanel">
            <div class="placeholder-panel">
              <h2>Summary</h2>
              <textarea id="summaryEditor" placeholder="Meeting overview, decisions, risks, open questions, and follow-up recommendations."></textarea>
            </div>
          </div>

          <div class="tab-panel" id="notesPanel">
            <div class="placeholder-panel notes-focus">
              <h2>Notes</h2>
              <textarea id="notesFocusEditor" placeholder="Write focused meeting notes here."></textarea>
            </div>
          </div>

          <div class="tab-panel" id="tasksPanel">
            <div class="tasks-view" id="tasksView"></div>
          </div>
        </section>
      </main>

      <aside class="rail">
        <section class="rail-card agenda-card">
          <div class="rail-head">
            <div>
              <div class="rail-title">Agenda</div>
              <div class="rail-subtitle" id="agendaSubtitle">Planned meeting flow</div>
            </div>
            <button class="rail-edit" id="editAgendaButton" type="button">Edit</button>
          </div>
          <div class="agenda-list" id="agendaList"></div>
        </section>

        <section class="rail-card notes-card">
          <div class="rail-head notes-tabs">
            <button class="rail-tab active" type="button" data-notes-tab="edit">Notes</button>
            <button class="rail-tab" type="button" data-notes-tab="preview">Preview</button>
            <button class="btn-icon expand" type="button" aria-label="Expand notes editor">
              <span class="expand-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="notes-toolbar" aria-label="Markdown tools">
            <button class="tool label" type="button" data-insert="# ">H1</button>
            <button class="tool label" type="button" data-insert="## ">H2</button>
            <button class="tool label" type="button" data-insert="### ">H3</button>
            <span class="sep"></span>
            <button class="tool" type="button" data-insert="- " aria-label="Bullet list"><span class="tool-list"></span></button>
            <button class="tool" type="button" data-insert="1. " aria-label="Numbered list"><span class="tool-list-num"></span></button>
            <button class="tool" type="button" data-insert="- [ ] " aria-label="Task"><span class="tool-check"></span></button>
            <span class="sep"></span>
            <button class="tool" type="button" data-insert="[text](url)" aria-label="Link"><span class="tool-link"></span></button>
            <button class="tool" type="button" data-insert="![alt](url)" aria-label="Image"><span class="tool-image"></span></button>
            <button class="tool" type="button" data-insert="`code`" aria-label="Code"><span class="tool-code"></span></button>
          </div>
          <textarea id="simple-editor" class="notes-editor" spellcheck="false"></textarea>
          <div id="notesPreview" class="notes-preview hidden"></div>
          <div class="notes-foot">
            <span>Private timestamped comments are excluded from sharing by default</span>
            <div class="save-status" id="saveStatus"><span class="ok-dot"></span><span id="saveStatusText">Saved just now</span></div>
          </div>
        </section>
      </aside>
    </div>

    <div class="modal-backdrop hidden" id="shareModal" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
      <div class="share-modal">
        <div class="modal-head">
          <h2 id="shareTitle">Share meeting record</h2>
          <button class="btn-icon" id="closeShareModal" type="button" aria-label="Close share modal">
            <span class="close-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div class="share-options-list">
          <label><input type="checkbox" checked /> Transcript</label>
          <label><input type="checkbox" checked /> Notes</label>
          <label><input type="checkbox" checked /> Summary</label>
          <label><input type="checkbox" checked /> Tasks</label>
          <label><input type="checkbox" checked /> Agenda</label>
          <label class="private-share"><input type="checkbox" id="includePrivateNotes" /> Include private timestamped comments</label>
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" id="copyShareText" type="button">Copy share text</button>
          <button class="new-meeting compact" id="doneShare" type="button">Done</button>
        </div>
      </div>
    </div>

    <div class="toast hidden" id="toast"></div>
  </body>
</html>
